name: Check Flutter versions

# Polls the upstream Flutter release index, updates versions.json when a
# new stable or beta build appears, commits the change directly to the
# default branch, and kicks off the build workflow. Designed to run
# unattended on a schedule.

on:
  schedule:
    # Every hour, on the hour.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: check-flutter-versions
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install jq
        run: |
          if ! command -v jq >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Update versions.json
        run: bash scripts/update_flutter_versions.sh

      - name: Show diff
        run: git --no-pager diff -- versions.json || true

      - name: Commit and push if changed
        id: commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- versions.json; then
            echo "No Flutter version changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Build a human-readable summary from the new versions.json so the
          # commit message captures which channels moved.
          summary=$(jq -r '
            .images
            | map("\(.tags | join("/")): \(.flutter_version)")
            | join(", ")
          ' versions.json)

          git add versions.json
          git commit -m "chore: update Flutter versions ($summary)"
          git push origin HEAD:${GITHUB_REF#refs/heads/}

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Trigger build workflow
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          EXPECTED_SHA: ${{ steps.commit.outputs.sha }}
        # Pushes made with GITHUB_TOKEN do not trigger downstream workflows,
        # so we explicitly dispatch the build after committing.
        #
        # workflow_dispatch resolves --ref to the branch tip *at dispatch
        # time*, and a freshly pushed commit can take a few seconds to become
        # visible to that resolver. Dispatching immediately therefore races
        # the push: if the old tip is resolved, the build checks out the
        # previous commit and rebuilds the previous Flutter version. (This is
        # exactly how 3.44.3 was committed but never built -- the dispatch
        # resolved to the prior 3.44.2 commit and rebuilt it under the
        # latest/stable tags.) Wait until the API reports our pushed commit as
        # the branch tip before dispatching, and fail loudly rather than
        # dispatch a stale build if it never shows up.
        run: |
          for attempt in $(seq 1 30); do
            remote_sha=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${BRANCH}" --jq '.sha')
            echo "Attempt ${attempt}: branch tip=${remote_sha} expected=${EXPECTED_SHA}"
            if [ "$remote_sha" = "$EXPECTED_SHA" ]; then
              echo "Pushed commit is visible to the API; dispatching build."
              gh workflow run build-and-push.yml --ref "$BRANCH"
              exit 0
            fi
            sleep 5
          done

          echo "::error::Pushed commit ${EXPECTED_SHA} never became the tip of ${BRANCH}; refusing to dispatch a stale build."
          exit 1
